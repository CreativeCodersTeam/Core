name: Sync AI Configuration

on:
  workflow_dispatch:
    inputs:
      create-pull-request:
        description: 'Create a pull request instead of committing directly to the branch'
        required: false
        type: boolean
        default: true
      ai-base-version:
        description: 'Version/branch of ai-base to use'
        required: false
        type: string
        default: 'main'
      clear-ai-configs:
        description: 'Clear existing AI configuration files before syncing'
        required: false
        type: boolean
        default: false
  schedule:
    - cron: '0 0 * * *' # Every day at midnight

env:
  AI_LANGUAGES: 'csharp,superpowers'
  AI_SYSTEMS: 'copilot,claude,junie'
  AI_PROJECT_MARKDOWN_FILE: ''

jobs:
  sync-scheduled:
    if: github.event_name == 'schedule'
    uses: CreativeCodersTeam/ai-base/.github/workflows/sync-ai-config.yml@main
    with:
      languages: ${{ vars.AI_LANGUAGES || env.AI_LANGUAGES }}
      ai-systems: ${{ vars.AI_SYSTEMS || env.AI_SYSTEMS }}
      project-markdown-file: ${{ vars.AI_PROJECT_MARKDOWN_FILE || env.AI_PROJECT_MARKDOWN_FILE }}
      ai-base-version: 'main'
      create-pull-request: true

  sync-manual:
    if: github.event_name == 'workflow_dispatch'
    uses: CreativeCodersTeam/ai-base/.github/workflows/sync-ai-config.yml@main
    with:
      languages: ${{ vars.AI_LANGUAGES || env.AI_LANGUAGES }}
      ai-systems: ${{ vars.AI_SYSTEMS || env.AI_SYSTEMS }}
      project-markdown-file: ${{ vars.AI_PROJECT_MARKDOWN_FILE || env.AI_PROJECT_MARKDOWN_FILE }}
      ai-base-version: ${{ inputs.ai-base-version }}
      create-pull-request: ${{ inputs.create-pull-request }}
      clear-ai-configs: ${{ inputs.clear-ai-configs }}
